<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能计算器</title>
    <link rel="stylesheet" href="css/app.4cf45cb4.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="calculator-box">
        <h2 class="title">价格计算器</h2>
        <!-- 初始价格输入框 -->
        <div class="input-group">
            <label for="initPrice">初始价格（元）</label>
            <input type="number" id="initPrice" placeholder="请输入初始价格" step="0.01" min="0.01" required>
        </div>
        <!-- 交易费用输入框，默认值5 -->
        <div class="input-group">
            <label for="fee">交易费用（元）</label>
            <input type="number" id="fee" value="5" step="0.01" min="0" required>
        </div>
        <!-- 计算按钮 -->
        <button class="calc-btn" onclick="calculatePrice()">计算</button>
        <!-- 结果展示区域 -->
        <div class="result-box">
            计算结果：<span class="result-text" id="result">请输入数据并点击计算</span>
        </div>
    </div>

    <script src="js/chunk-vendors.0244f57c.js"></script>
    <script src="js/app.f13747c3.js"></script>
</body>

</html>
