<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <link rel="stylesheet" href="css/app.4cf45cb4.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="calculator-box">
        <h2 class="title">模拟计算器</h2>
        <div class="row-group">
            <div class="input-group">
                <label for="initPrice">初始价（元）</label>
                <input type="number" id="initPrice" placeholder="请输入初始价格" step="0.01" min="0.01" required>
            </div>
            <div class="input-group">
                <label for="buyAmount">买入量</label>
                <input type="number" id="buyAmount" value="100" step="100" min="100" inputmode="numeric"
                    pattern="[0-9]*" required>
            </div>
        </div>
        <div class="row-group">
            <div class="input-group">
                <label for="profitPercent">止盈（%）</label>
                <input type="number" id="profitPercent" value="4" step="0.01" min="0" required>
            </div>
            <div class="input-group">
                <label for="lossPercent">止损（%）</label>
                <input type="number" id="lossPercent" value="3" step="0.01" min="0" required>
            </div>
        </div>
        <!-- 计算按钮 -->
        <button class="calc-btn" onclick="calculatePrice()">计算</button>
        <!-- 结果展示区域 -->
        <div class="result-box">
            <div class="result-label">输出（单位：元）：</div>
            <div class="result-text" id="result">请输入计算数据</div>
        </div>
    </div>

    <script src="js/chunk-vendors.0244f57c.js"></script>
    <script src="js/app.f13747c3.js"></script>
</body>

</html>
